[build]
  command = "pip install -r requirements.txt"
  publish = "frontend"
  functions = "backend"

[build.environment]
  PYTHON_VERSION = "3.11.0"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/app/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
