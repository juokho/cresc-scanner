services:
  # ── 스캐너 백엔드 ─────────────────────────────────────────
  - type: web
    name: cresc-scanner-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: PREMIUM_API_KEYS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── 트레이딩 백엔드 ───────────────────────────────────────
  - type: web
    name: cresc-trading-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
