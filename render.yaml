services:
  # ── 프론트엔드 정적 사이트 ──────────────────────────────────
  - type: static
    name: cresc-scanner-frontend
    plan: free
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_SCANNER_API_URL
        sync: false
      - key: VITE_TRADING_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html

  # ── 스캐너 백엔드 (web service = HTTP 포트 열림) ─────────────
  - type: web
    name: cresc-scanner-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: PREMIUM_API_KEYS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── 트레이딩 백엔드 (web service = HTTP 포트 열림) ───────────
  - type: web
    name: cresc-trading-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
