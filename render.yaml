services:
  - type: static
    name: quanter
    plan: free
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
 
  - type: worker
    name: quanter-api
    runtime: python
    plan: free
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
 