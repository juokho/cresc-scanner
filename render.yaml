services:
  - type: web
    name: cresc-scanner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    staticPublishPath: ./frontend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: PREMIUM_API_KEYS
        sync: false
